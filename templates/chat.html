{% extends "base.html" %}
{% block head_extra %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat-frontend.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/device-preview.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile-chat-ui.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/wavechat-preview.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/wavechat-ref.css', v=asset_version) }}">
{% endblock %}
{% block content %}
<main
    class="chat-shell whatsapp-shell whatsapp-web-frontend"
    id="chat-app"
    data-preview-mode="mobile"
    data-active-screen="list"
    data-sidebar-view="chats"
    data-list-theme="light"
    data-socket-token="{{ socket_token }}"
    data-rtc-config='{{ rtc_configuration | tojson }}'
>
    <div class="whatsapp-layout">
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header brand-header">
                <div class="brand-pill">
                    <img src="{{ url_for('static', filename='img/wavechat-logo.png') }}" alt="WaveChat logo">
                    <strong>WaveChat</strong>
                </div>
                <div class="sidebar-actions"></div>
            </header>

            <div class="sidebar-tools" id="sidebar-tools">
                <input class="search-input sidebar-search" id="chat-search" type="search" placeholder="Search conversations">
            </div>

            <section class="chat-list" id="chat-list" aria-live="polite"></section>
        </aside>

        <section class="conversation" id="conversation">
            <header class="conversation-header" id="conversation-header">
                <button class="icon-btn compact-btn toolbar-button mobile-only" id="mobile-back-btn" title="Back" aria-label="Back">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.4 5.4 9 11.8l6.4 6.4-1.4 1.4L6.2 11.8 14 4z" fill="currentColor"/></svg>
                </button>

                <button class="conversation-meta" id="conversation-meta-btn" type="button" aria-label="View contact">
                    <div class="avatar conversation-avatar-large" id="conversation-avatar">S</div>
                    <div class="conversation-meta-copy">
                        <h3 id="conversation-title">Sarah Chen</h3>
                        <p id="conversation-status">Online</p>
                    </div>
                </button>

                <div class="conversation-actions">
                    <button type="button" class="icon-btn compact-btn toolbar-button" id="voice-call-btn" title="Voice call" aria-label="Voice call">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8a15.7 15.7 0 0 0 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1 .3 2 .5 3 .5.7 0 1.2.5 1.2 1.2V20c0 .7-.5 1.2-1.2 1.2C10.3 21.2 2.8 13.7 2.8 4.4 2.8 3.7 3.3 3.2 4 3.2h3.2c.7 0 1.2.5 1.2 1.2 0 1 .2 2 .5 3 .1.4 0 .9-.3 1.2l-2 2.2z" fill="currentColor"/></svg>
                    </button>
                    <button type="button" class="icon-btn compact-btn toolbar-button" id="video-call-btn" title="Video call" aria-label="Video call">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 10.5V7a2 2 0 0 0-2-2H5A2 2 0 0 0 3 7v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3.5L22 18V6z" fill="currentColor"/></svg>
                    </button>
                    <button type="button" class="icon-btn compact-btn toolbar-button" id="chat-info-btn" title="More" aria-label="More options" aria-expanded="false">
                        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7a1.75 1.75 0 1 0 0-3.5A1.75 1.75 0 0 0 12 7zm0 7a1.75 1.75 0 1 0 0-3.5A1.75 1.75 0 0 0 12 14zm0 7a1.75 1.75 0 1 0 0-3.5A1.75 1.75 0 0 0 12 21z" fill="currentColor"/></svg>
                    </button>

                    <div class="chat-menu hidden" id="chat-menu" role="menu" aria-label="Chat options">
                        <button type="button" class="chat-menu-item" data-chat-menu-action="profile">View profile</button>
                        <button type="button" class="chat-menu-item" data-chat-menu-action="mute">Mute notifications</button>
                        <div class="chat-menu-divider"></div>
                        <button type="button" class="chat-menu-item danger" data-chat-menu-action="delete">Delete chat</button>
                    </div>
                </div>
            </header>

            <div class="messages-scroller" id="messages-scroller">
                <section class="messages" id="messages"></section>
            </div>

            <form class="composer" id="composer" autocomplete="off">
                <button class="composer-emoji" id="emoji-toggle-btn" type="button" title="Emoji" aria-label="Emoji">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.8a9.2 9.2 0 1 0 9.2 9.2A9.2 9.2 0 0 0 12 2.8zm0 2a7.2 7.2 0 1 1-7.2 7.2A7.2 7.2 0 0 1 12 4.8zm-3 5.1a1.1 1.1 0 1 0 1.1 1.1A1.1 1.1 0 0 0 9 9.9zm6 0a1.1 1.1 0 1 0 1.1 1.1A1.1 1.1 0 0 0 15 9.9zm-4.8 4a4.3 4.3 0 0 0 7.6 0z" fill="currentColor"/></svg>
                </button>
                <input id="message-input" type="text" placeholder="Message" aria-label="Message">
                <button class="composer-plus" id="attachment-btn" type="button" title="Attach" aria-label="Attach">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16.5 6.5v8.8a4.5 4.5 0 1 1-9 0V7.8a3 3 0 1 1 6 0v6.9a1.5 1.5 0 1 1-3 0V9.2" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                </button>
                <button class="send-btn" id="send-btn" type="submit" title="Send" aria-label="Send">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 20 21 12 3 4l3.8 6.5L14 12l-7.2 1.5z" fill="currentColor"/></svg>
                </button>
            </form>
        </section>
    </div>

    <input id="file-input" type="file" accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip,.rar" hidden>
    <input id="profile-photo-input" type="file" accept="image/*" hidden>
    <input id="camera-input" type="file" accept="image/*,video/*" capture="environment" hidden>
    <input id="status-file-input" type="file" accept="image/*,video/*" hidden>

    <nav class="mobile-bottom-nav" id="mobile-bottom-nav" aria-label="Primary mobile navigation">
        <button type="button" class="mobile-nav-item active" data-mobile-tab="chats" aria-pressed="true">
            <span class="mobile-nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h9A2.5 2.5 0 0 1 19 6.5v6A2.5 2.5 0 0 1 16.5 15H10l-3.8 3.2c-.6.5-1.5.1-1.5-.7V15A2.5 2.5 0 0 1 2 12.5v-6A2.5 2.5 0 0 1 4.5 4H5z" fill="currentColor"/></svg>
            </span>
            <span>Chats</span>
            <span class="nav-badge" id="chats-nav-badge">1</span>
        </button>
        <button type="button" class="mobile-nav-item" data-mobile-tab="status" aria-pressed="false">
            <span class="mobile-nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.8a9.2 9.2 0 1 0 9.2 9.2A9.2 9.2 0 0 0 12 2.8zm0 2.2a7 7 0 1 1-7 7 7 7 0 0 1 7-7zm0 2.6A4.4 4.4 0 1 0 16.4 12 4.4 4.4 0 0 0 12 7.6z" fill="currentColor"/></svg>
            </span>
            <span>Stories</span>
            <span class="nav-badge" id="status-nav-badge">1</span>
        </button>
        <button type="button" class="mobile-nav-item" data-mobile-tab="profile" aria-pressed="false">
            <span class="mobile-nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.6a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-3.2 0-7 1.7-7 4v1.6h14V18.6c0-2.3-3.8-4-7-4z" fill="currentColor"/></svg>
            </span>
            <span>Profile</span>
        </button>
        <button type="button" class="mobile-nav-item" data-mobile-tab="camera" aria-pressed="false">
            <span class="mobile-nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3.4l1.2-1.8h2.8L16.6 5H18a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm4 3.1A4.9 4.9 0 1 0 16.9 13 4.9 4.9 0 0 0 12 8.1z" fill="currentColor"/></svg>
            </span>
            <span>Camera</span>
        </button>
        <button type="button" class="mobile-nav-item" data-mobile-tab="calls" aria-pressed="false">
            <span class="mobile-nav-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.6 10.8a15.7 15.7 0 0 0 6.6 6.6l2.2-2.2c.3-.3.8-.4 1.2-.3 1 .3 2 .5 3 .5.7 0 1.2.5 1.2 1.2V20c0 .7-.5 1.2-1.2 1.2C10.3 21.2 2.8 13.7 2.8 4.4 2.8 3.7 3.3 3.2 4 3.2h3.2c.7 0 1.2.5 1.2 1.2 0 1 .2 2 .5 3 .1.4 0 .9-.3 1.2l-2 2.2z" fill="currentColor"/></svg>
            </span>
            <span>Calls</span>
            <span class="nav-badge" id="calls-nav-badge">1</span>
        </button>
    </nav>

    <section class="story-viewer hidden" id="story-viewer" aria-hidden="true">
        <div class="story-viewer-card">
            <div class="story-viewer-head">
                <button type="button" class="story-viewer-close" id="story-viewer-close" aria-label="Close story">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7 17 17M17 7 7 17" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"/></svg>
                </button>
                <div class="avatar story-viewer-avatar" id="story-viewer-avatar">A</div>
                <div class="story-viewer-copy">
                    <strong id="story-viewer-title">Aadhitya</strong>
                    <span id="story-viewer-meta">31m</span>
                </div>
            </div>
            <div class="story-viewer-progress"><span></span></div>
            <div class="story-viewer-body" id="story-viewer-body"></div>
            <div class="story-viewer-footer">
                <input type="text" class="story-reply-input" id="story-reply-input" placeholder="Reply to story...">
                <button type="button" class="story-reply-btn" id="story-reply-btn" aria-label="React to story">
                    <span aria-hidden="true">&#10084;</span>
                </button>
            </div>
        </div>
    </section>

    <section class="story-sheet hidden" id="story-sheet" aria-hidden="true">
        <div class="story-sheet-backdrop" id="story-sheet-backdrop"></div>
        <div class="story-sheet-card">
            <div class="story-sheet-header">
                <h2>Add to Story</h2>
                <button type="button" class="sheet-close" id="story-sheet-close" aria-label="Close">&times;</button>
            </div>
            <button type="button" class="story-sheet-action" data-story-sheet-action="photo">
                <span class="story-sheet-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5zm4 2.5a1.6 1.6 0 1 0 0-3.2A1.6 1.6 0 0 0 8 9zm1.2 7.4h7.6l-2.5-3.2-1.8 2.1-1.5-1.6z" fill="currentColor"/></svg>
                </span>
                <span class="story-sheet-copy">
                    <strong>Photo</strong>
                    <span>Take or upload a photo</span>
                </span>
            </button>
            <button type="button" class="story-sheet-action" data-story-sheet-action="video">
                <span class="story-sheet-icon">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 6.5A2.5 2.5 0 0 1 7.5 4h7A2.5 2.5 0 0 1 17 6.5V8l4-2v12l-4-2v1.5A2.5 2.5 0 0 1 14.5 20h-7A2.5 2.5 0 0 1 5 17.5z" fill="currentColor"/></svg>
                </span>
                <span class="story-sheet-copy">
                    <strong>Video</strong>
                    <span>Record or upload a video</span>
                </span>
            </button>
        </div>
    </section>

    <dialog class="capture-modal" id="capture-modal">
        <div class="capture-card">
                <div class="capture-stage" id="capture-stage">
                    <video class="capture-live hidden" id="capture-live" autoplay playsinline muted></video>
                    <img class="capture-preview hidden" id="capture-photo-preview" alt="Capture preview">
                    <video class="capture-preview hidden" id="capture-video-preview" controls playsinline></video>
                    <div class="capture-empty hidden" id="capture-empty">
                        <div>
                            <h3>Camera ready</h3>
                            <p>Use the WaveChat camera or switch to your device camera if permissions are blocked.</p>
                        </div>
                    </div>
                    <div class="capture-filter-overlay" id="capture-filter-overlay" aria-hidden="true"></div>

                <div class="capture-overlay">
                    <div class="capture-topbar">
                        <button type="button" class="capture-top-control" id="capture-close-btn" aria-label="Close camera">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7 17 17M17 7 7 17" fill="none" stroke="currentColor" stroke-linecap="round" stroke-width="2"/></svg>
                        </button>
                        <span class="capture-demo-pill" id="capture-demo-pill">Demo Mode</span>
                        <button type="button" class="capture-top-control" id="capture-switch-btn" aria-label="Switch camera">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 5h4v4M9 19H5v-4M5 9a7 7 0 0 1 12-3l2 3M19 15a7 7 0 0 1-12 3l-2-3" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg>
                        </button>
                    </div>
                    <div class="capture-right-rail">
                        <button type="button" class="capture-rail-btn" id="capture-text-btn" aria-label="Text tool"><span class="capture-rail-text">T</span></button>
                        <button type="button" class="capture-rail-btn" id="capture-emoji-btn" aria-label="Emoji tool">&#9786;</button>
                        <button type="button" class="capture-rail-btn" id="capture-effects-btn" aria-label="Effects tool">
                            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5 14.4 9l5.6.5-4.2 3.9 1.2 5.5L12 15.9 7 18.9l1.2-5.5L4 9.5 9.6 9z" fill="currentColor"/></svg>
                        </button>
                    </div>
                    <div class="capture-bottom-bar">
                        <div class="capture-filter-rail" id="capture-filter-rail"></div>
                        <div class="capture-bottom-controls">
                            <div></div>
                            <div class="capture-shutter-group">
                                <div class="capture-mode-overlay">
                                    <button type="button" class="filter-chip active" id="capture-photo-btn" data-capture-mode="photo">PHOTO</button>
                                    <button type="button" class="capture-shutter" id="capture-record-btn" aria-label="Capture"></button>
                                    <button type="button" class="filter-chip" id="capture-video-btn" data-capture-mode="video">VIDEO</button>
                                </div>
                            </div>
                            <button type="button" class="capture-send" id="capture-use-btn" disabled aria-label="Use capture">
                                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 20 21 12 3 4l3.8 6.5L14 12l-7.2 1.5z" fill="currentColor"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <p class="capture-status" id="capture-status">Demo Mode</p>
        </div>
    </dialog>

    <section class="call-modal-root hidden" id="call-modal-root" aria-hidden="true"></section>
    <div class="toast-stack" id="toast-stack" aria-live="polite"></div>
</main>
<script src="{{ url_for('static', filename='vendor/socket.io.min.js', v=asset_version) }}"></script>
<script type="module" src="{{ url_for('static', filename='js/chat.js', v=asset_version) }}"></script>
{% endblock %}
